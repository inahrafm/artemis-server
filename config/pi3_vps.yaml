# config/pi3_vps.yaml — VPS simulasi Raspberry Pi 3
# tc-netem diinjeksikan via simulate_node.py sebelum run
node_id: pi3_vps_sim
device_type: pi3
model_edge: models/best.onnx
model_type: onnx
model_de: models/lightgbm_de_v2.pkl
server_url: http://HOMESERVER_IP:8000   # ganti dengan IP homeserver langsung
images_dir: data/full_test/images
sequences: sequences/sequence_list_v2.json
thresholds: thresholds_v2.json
request_timeout: 30
forced_offload_interval: 50
output_dir: results
